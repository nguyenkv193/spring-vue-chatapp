server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5434/chatapp}
    username: ${DB_USERNAME:chatapp}
    password: ${DB_PASSWORD:chatapp}
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: http://localhost:5173
  websocket:
    allowed-origins: http://localhost:5173
  security:
    jwt:
      secret: replace-with-a-long-random-secret-at-least-32-chars
      issuer: chat-app
      access-token-ttl-minutes: 60
