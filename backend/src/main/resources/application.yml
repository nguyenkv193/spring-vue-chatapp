spring:
  application:
    name: chat-app-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chatapp}
    username: ${DB_USERNAME:chatapp}
    password: ${DB_PASSWORD:chatapp}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  websocket:
    allowed-origins: ${APP_WS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:}
      issuer: ${APP_JWT_ISSUER:chat-app}
      access-token-ttl-minutes: ${APP_JWT_ACCESS_TOKEN_TTL_MINUTES:60}


